# HEMSAM Configuration File

# Model Configuration
model:
  num_classes: 15
  feature_dim: 256
  use_sam: false
  use_cdms: true
  use_uhdam: true
  freeze_sam_encoder: true

# Training Configuration
training:
  num_epochs: 100
  batch_size: 8
  learning_rate: 0.0001
  weight_decay: 0.0001
  scheduler: cosine  # cosine, plateau
  early_stop_patience: 20
  
  # Loss weights
  lambda_seg: 1.0
  lambda_cls: 0.5
  dice_weight: 0.5
  focal_weight: 0.5
  focal_alpha: 0.25
  focal_gamma: 2.0
  
  use_multi_task_loss: false

# Data Configuration
data:
  image_size: 224
  num_workers: 4
  pin_memory: true
  
  # Augmentation
  augmentation:
    rotation_degrees: 45
    horizontal_flip_prob: 0.5
    vertical_flip_prob: 0.3
    brightness_limit: 0.2
    contrast_limit: 0.2
    gaussian_blur_prob: 0.2
    cutout_prob: 0.3

# Logging
logging:
  use_wandb: false
  wandb_project: hemsam
  log_interval: 10
  eval_interval: 1
  
# Paths
paths:
  checkpoint_dir: ./checkpoints
  log_dir: ./logs
  output_dir: ./outputs